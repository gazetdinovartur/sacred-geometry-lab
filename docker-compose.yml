services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sacred_geometry_php
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: dev
      DATABASE_URL: mysql://app:app@mysql:3306/sacred_geometry?serverVersion=8.4&charset=utf8mb4
      DEFAULT_URI: http://localhost:8083
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: sacred_geometry_nginx
    ports:
      - "8083:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: sacred_geometry_mysql
    ports:
      - "3310:3306"
    environment:
      MYSQL_DATABASE: sacred_geometry
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uapp", "-papp"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailer:
    image: axllent/mailpit:latest
    container_name: sacred_geometry_mailer
    ports:
      - "8028:8025"
      - "1028:1025"

volumes:
  mysql_data:
