security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api:
            pattern: ^/api
            lazy: true
            provider: app_user_provider
            stateless: false
            context: main
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\OAuthAuthenticator
            logout:
                path: account_logout
                target: home

    access_control:
        - { path: ^/api/account, roles: ROLE_USER }
        - { path: ^/api/patterns, roles: ROLE_USER }
        - { path: ^/account, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
